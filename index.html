<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClow Intel Hub | 2000+ Nodes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: {
                        dark: { 950: '#040405', 900: '#0a0a0c', 800: '#141418' },
                        cyan: { 400: '#00f2ff' },
                        pink: { 500: '#ff3366' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #040405;
            color: #888;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        .cube-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .cube {
            background: #0a0a0c;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 12px;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .cube:hover {
            border-color: #00f2ff;
            background: #00f2ff0a;
            transform: translateY(-5px) scale(1.02);
            z-index: 10;
            box-shadow: 0 10px 30px -10px rgba(0, 242, 255, 0.3);
        }

        .cube.openclow-item {
            border-color: #ff3366 !important;
            background: linear-gradient(135deg, #0a0a0c, #4a001a33);
            box-shadow: inset 0 0 20px #ff336611 !important;
        }

        .cube.openclow-item:hover {
            background: linear-gradient(135deg, #0a0a0c, #4a001a66);
            box-shadow: 0 0 40px #ff336633 !important;
        }

        .cube.openclow-item .cube-category {
            color: #ff3366 !important;
        }

        .cube.openclow-item .cube-title {
            color: #fff !important;
            text-shadow: 0 0 10px #ff336644;
        }

        .cube-title {
            color: #ddd;
            font-size: 0.7rem;
            line-height: 1.3;
            font-weight: 700;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .cube-category {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #00f2ff;
            font-weight: 900;
            margin-bottom: 4px;
        }

        #search {
            background: #0a0a0c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .stats-chip {
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .update-banner {
            background: #ff336611;
            border: 1px solid #ff336633;
            color: #ff3366;
            font-size: 10px;
            padding: 8px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body class="min-h-screen">
    <div
        class="fixed inset-0 pointer-events-none opacity-10 bg-[radial-gradient(#00f2ff44_1px,transparent_1px)] [background-size:32px_32px]">
    </div>

    <header
        class="max-w-[1600px] mx-auto p-6 md:p-10 mb-4 border-b border-white/5 relative z-10 flex flex-wrap items-center justify-between gap-6">
        <div>
            <h1 class="text-3xl md:text-5xl font-black tracking-tighter uppercase italic">
                OPEN<span class="text-pink-500">CLOW</span> MEGA HUB
            </h1>
            <p class="text-[10px] font-bold text-pink-500 uppercase tracking-[0.4em] mt-2">
                Massive Intel Network | <span id="node-count-top">0</span> Active Nodes
            </p>
        </div>

        <div class="flex-grow max-w-2xl">
            <input type="text" id="search" placeholder="Buscar en OpenClow Hub..."
                class="w-full py-3 px-6 rounded-xl outline-none focus:border-pink-500 transition-all font-bold text-sm">
        </div>

        <div class="flex flex-col items-end gap-2 text-right">
            <div class="stats-chip text-pink-500">STATUS: OPENCLOW_MASTER_ACTIVE</div>
            <div id="file-timestamp" class="stats-chip text-white font-bold border-white/20">FILE_SYNC: --:--</div>
        </div>
    </header>

    <main class="max-w-[1800px] mx-auto relative z-10 px-6">
        <div id="deployment-info" class="update-banner">
            FILE_UPLOAD_TIME: <span id="deploy-time">09/03/2026 13:42:28</span>
        </div>

        <div id="cube-grid" class="cube-grid">
            <div
                class="col-span-full py-40 text-center animate-pulse text-pink-500 font-bold tracking-widest uppercase">
                Synchronizing High Density Intel Nodes...
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 border-t border-white/5 text-center">
        <div class="text-[9px] tracking-[0.6em] font-black uppercase text-gray-700 mb-4">
            Autonomous Massive Hub v1.0 | OpenClow Total Nodes: <span id="node-count-footer">0</span>
        </div>
    </footer>

    <script>
        // BACKUP DATA INYECTADO - CARGA MASIVA (200 ITEMS PARA MODO OFFLINE)
        const BACKUP_DATA = {
            "deploymentTime": "09/03/2026 13:42:28",
            "liveTrends": [
                { "title": "OpenClow Network: Real-time global intelligence node activated", "category": "OpenClow", "openClow": true, "important": true, "link": "#", "source": "openclow.internal" },
                { "title": "Digital Sovereignty in the Age of OpenClow Architectures", "category": "OpenClow", "openClow": true, "important": true, "link": "#", "source": "openclow.internal" },
                { "title": "Azure AI Search vs. Manticore Search", "source": "manticoresearch.com", "link": "https://manticoresearch.com/blog/azure-ai-search-vs-manticore/", "category": "Azure" },
                { "title": "Show HN: Azdo – A TUI for Azure DevOps", "source": "github.com", "link": "https://github.com/Elpulgo/azdo", "category": "Azure" },
                { "title": "NPM CLI for Azure DevOps Boards with AI Support", "source": "npmjs.com", "link": "https://www.npmjs.com/package/adoboards", "category": "Azure" },
                { "title": "Tell HN: Azure Data Factory pipeline execution delays", "source": "news.ycombinator.com", "link": "https://news.ycombinator.com/item?id=47283742", "category": "Azure" },
                { "title": "Show HN: Khaga – AI Infrastructure Diagnosis", "source": "khaga.dev", "link": "https://khaga.dev", "category": "Azure" },
                { "title": "10M live price points from AWS, Azure and GCP", "source": "infracost.io", "link": "https://www.infracost.io/blog/infracost-now-tracks-10-million-cloud-service-skus/", "category": "Azure" },
                { "title": "Microsoft Expands Starlink Alliance to Grow Azure", "source": "yahoo.com", "link": "#", "category": "Azure" },
                { "title": "European users can now run disconnected Azure Local", "source": "techradar.com", "link": "#", "category": "Azure", "important": true },
                { "title": "CleanCloud – 20 rules to find what's costing money", "source": "news.ycombinator.com", "link": "#", "category": "Azure" },
                { "title": "Making MCP Servers Work with Entra ID on Azure", "source": "ignitionai.xyz", "link": "#", "category": "Azure" },
                { "title": "Show HN: Fast TUI for Azure Key Vault secrets", "source": "github.com", "link": "#", "category": "Azure" },
                { "title": "MariaDB Cloud BYOA inside Azure subscription", "source": "mariadb.com", "link": "#", "category": "Azure" },
                { "title": "Cloud-cost-CLI – Find cloud waste in AWS/Azure", "source": "github.com", "link": "#", "category": "Azure" },
                { "title": "Code signing Windows apps with Azure Artifact", "source": "devclass.com", "link": "#", "category": "Azure" },
                { "title": "Azure Document Intelligence at scale: what broke", "source": "invofox.com", "link": "#", "category": "Azure" },
                { "title": "Microsoft's Azure Linux repository overview", "source": "github.com", "link": "#", "category": "Azure" },
                { "title": "Ask HN: Is Azure DevOps Effectively EOL?", "source": "news.ycombinator.com", "link": "#", "category": "Azure" },
                { "title": "Show HN: Tfstate-audit – search/diff Terraform state", "source": "github.com", "link": "#", "category": "Azure" },
                { "title": "MLShip – Deploy Streamlit ML apps in 60s", "source": "knowza.ai", "link": "#", "category": "AWS" },
                { "title": "AWS Deep Dives – Amazon SNS Service", "source": "localstack.cloud", "link": "#", "category": "AWS" },
                { "title": " Iranians news service claims drone strikes on AWS", "source": "theregister.com", "link": "#", "category": "AWS" },
                { "title": "We Moved from AWS to Hetzner. Cut Costs 89%", "source": "medium.com", "link": "#", "category": "AWS" },
                { "title": "Amazon says Anthropic's Claude still OK for AWS", "source": "cnbc.com", "link": "#", "category": "AWS" },
                { "title": "Kubernetes: The State of Open Source in 2026", "category": "Kubernetes", "source": "k8s.io" },
                { "title": "Docker Desktop vs Colima for local development", "category": "Docker", "source": "medium.com" },
                { "title": "Rust Lang: Why the gaming industry is switching", "category": "Rust", "source": "rust-lang.org" },
                { "title": "PostgreSQL 18: What to expect from the next release", "category": "PostgreSQL", "source": "postgres.org" },
                { "title": "Cybersecurity: Zero Trust in the OpenClow era", "category": "OpenClow", "openClow": true, "source": "openclow.internal" }
            ]
        };

        // Simular mas datos de respaldo (repetidos para ver volumen)
        for (let i = 0; i < 150; i++) {
            BACKUP_DATA.liveTrends.push({
                "title": `Intelligence Node #${i + 100}: Monitoring Global Systems...`,
                "category": i % 3 === 0 ? "OpenClow" : "Intel",
                "openClow": i % 3 === 0,
                "source": "node-x.internal",
                "link": "#"
            });
        }

        let fullData = [];

        async function init() {
            lucide.createIcons();
            const grid = document.getElementById('cube-grid');

            try {
                // Intento de carga dinámica (Funcionará en GitHub Pages o servidor local)
                const response = await fetch('updates.json?t=' + Date.now());
                if (!response.ok) throw new Error("Local File Protocol");
                const data = await response.json();

                fullData = data.liveTrends || [];
                console.log(`Cargados ${fullData.length} nodos dinámicamente.`);

                if (data.deploymentTime) document.getElementById('deploy-time').innerText = data.deploymentTime;
                if (data.lastUpdated) {
                    const date = new Date(data.lastUpdated);
                    document.getElementById('file-timestamp').innerText = `LAST_SYNC: ${date.toLocaleString('es-ES')}`;
                }
            } catch (err) {
                // MODO SEGURO: Carga los datos inyectados si fallamos (Como al abrir file://)
                console.warn("Usando Inteligencia Residente (Modo Offline).");
                fullData = BACKUP_DATA.liveTrends;
                document.getElementById('file-timestamp').innerText = "RESIDENT_MODE";
            }

            document.getElementById('node-count-top').innerText = fullData.length;
            document.getElementById('node-count-footer').innerText = fullData.length;
            renderCubes(fullData);
        }

        function renderCubes(items) {
            const grid = document.getElementById('cube-grid');
            const html = items.map(item => {
                const target = item.link && item.link !== '#' ? item.link : `https://www.google.com/search?q=${encodeURIComponent(item.title)}`;
                const isOC = item.openClow === true || (item.title && item.title.toLowerCase().includes('openclow'));

                return `
                <div class="cube ${isOC ? 'openclow-item' : ''}" onclick="window.open('${target}', '_blank')">
                    <div class="cube-category">${item.category || 'INTEL'}</div>
                    <div class="cube-title">${item.title}</div>
                    <div class="text-[7px] text-gray-400 mt-2 font-mono truncate w-full uppercase">
                        ${item.source || 'Node-X'}
                    </div>
                </div>
                `;
            }).join('');
            grid.innerHTML = html;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = fullData.filter(i =>
                (i.title && i.title.toLowerCase().includes(q)) ||
                (i.category && i.category.toLowerCase().includes(q))
            );
            renderCubes(filtered);
            document.getElementById('node-count-top').innerText = filtered.length;
        });

        init();
    </script>
</body>

</html>
