<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClow Intel Hub | Massive Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        dark: { 950: '#020203', 900: '#050507', 800: '#0c0c10' },
                        gold: { 400: '#ffd700' },
                        pink: { 500: '#ff0055' }, // Rojo Neón OpenClow
                        cyan: { 400: '#00f2ff' }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020203;
            color: #666;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        /* Rompiendo el patrón visual con variaciones de escala y rotación */
        .cube {
            background: #050507;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
            border-radius: 4px;
            font-size: 0.65rem;
        }

        .cube:hover {
            border-color: #ff0055;
            background: #ff005508;
            transform: scale(1.05) rotate(1deg);
            z-index: 50;
            box-shadow: 0 0 30px #ff005522;
        }

        /* Estilo OpenClow: Links Reales y Prioridad */
        .cube.openclow-active {
            border-color: #ff005566 !important;
            background: linear-gradient(135deg, #050507, #ff005511);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px #ff005511;
            }

            100% {
                box-shadow: 0 0 20px #ff005533;
            }
        }

        .cube-title {
            color: #ccc;
            line-height: 1.2;
            font-weight: 600;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            pointer-events: none;
        }

        .cube-category {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #ff0055;
            margin-bottom: 5px;
            font-weight: 800;
            font-family: 'JetBrains Mono';
        }

        .glitch-text {
            text-shadow: 2px 0 #00f2ff, -2px 0 #ff0055;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-2px, 2px)
            }

            40% {
                transform: translate(-2px, -2px)
            }

            60% {
                transform: translate(2px, 2px)
            }

            80% {
                transform: translate(2px, -2px)
            }

            100% {
                transform: translate(0)
            }
        }

        #search {
            background: #0c0c10;
            border: 1px solid #ffffff08;
            color: white;
            border-radius: 4px;
        }

        #search:focus {
            border-color: #ff0055;
            box-shadow: 0 0 20px #ff005511;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.03);
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            from {
                top: -10%
            }

            to {
                top: 110%
            }
        }
    </style>
</head>

<body class="min-h-screen">
    <div class="scanline"></div>
    <div
        class="fixed inset-0 pointer-events-none opacity-5 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,128,0.06))] [background-size:100%_2px,3px_100%]">
    </div>

    <header
        class="max-w-[1800px] mx-auto p-6 md:p-8 flex flex-wrap items-center justify-between gap-6 border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-[100]">
        <div>
            <h1 class="text-2xl md:text-4xl font-black tracking-tight uppercase italic glitch-text">
                OPEN<span class="text-pink-500">CLOW</span> v2.0
            </h1>
            <div class="flex items-center gap-3 mt-2">
                <span
                    class="text-[8px] font-mono text-cyan-400 bg-cyan-400/5 px-2 py-1 rounded border border-cyan-400/20">
                    INTEL_MATRIX: <span id="node-count">0</span> NODES
                </span>
                <span
                    class="text-[8px] font-mono text-pink-500 bg-pink-500/5 px-2 py-1 rounded border border-pink-500/20">
                    STATUS: UNPATTERN_MODE
                </span>
            </div>
        </div>

        <div class="flex-grow max-w-xl">
            <input type="text" id="search" placeholder="Infiltrar búsqueda en la red..."
                class="w-full py-2 px-6 outline-none font-mono text-xs italic tracking-widest uppercase">
        </div>

        <div class="text-right font-mono">
            <div class="text-[9px] text-gray-500 mb-1">DATA_ARRIVAL_TIME</div>
            <div id="arrival-time" class="text-xs text-white bg-white/5 py-1 px-3 rounded">09.03.2026 13:48:17</div>
        </div>
    </header>

    <main class="max-w-[1900px] mx-auto">
        <div id="matrix-grid" class="matrix-grid">
            <div
                class="col-span-full py-60 text-center font-mono text-pink-500 animate-pulse tracking-[1rem] uppercase">
                Estableciendo enlace de inteligencia...
            </div>
        </div>
    </main>

    <footer class="mt-20 py-8 border-t border-white/5 text-center font-mono text-[8px] tracking-[0.5em] text-gray-700">
        OPENCLOW_SYSTEM_RESTORED // NO_PATTERNS // DIRECT_ACCESS_ENABLED
    </footer>

    <script>
        // MODO RESIDENTE: Links reales y noticias frescas (Breaking the Pattern)
        const RESIDENT_NODES = [
            { "title": "OpenClaw v2.5: Nueva era de plugins y soporte KIMI K2.5", "category": "OpenClow", "openClow": true, "link": "https://openclaw.ai", "source": "openclaw.ai" },
            { "title": " Peter Steinberger anuncia transición de OpenClaw a Fundación OpenSource", "category": "OpenClow", "openClow": true, "link": "https://github.com/openclaw/openclaw", "source": "wikipedia" },
            { "title": "Infiltración en el Hub: 13,000 skills comunitarias disponibles", "category": "OpenClow", "openClow": true, "link": "https://github.com/openclaw/openclaw", "source": "ClawHub" },
            { "title": "Moltworker: OpenClaw ejecutándose en Cloudflare Workers", "category": "Architecture", "link": "https://github.com/moltworker", "source": "GitHub" },
            { "title": "Seguridad Alpha: 34 commits críticos detectados en OpenClow", "category": "Security", "openClow": true, "link": "https://openclaw.ai/security", "source": "Intel" },
            { "title": "100K Stars: OpenClaw rompe récords de crecimiento en GitHub", "category": "OpenClow", "openClow": true, "link": "https://github.com/openclaw/openclaw", "source": "GitHub" },
            { "title": "Azure AI vs Manticore: Comparativa de búsqueda vectorial", "category": "Cloud", "link": "https://manticoresearch.com/blog/azure-ai-search-vs-manticore/", "source": "Manticore" },
            { "title": "Zero Trust en infraestructuras OpenClow: Guía de implementación", "category": "OpenClow", "openClow": true, "link": "https://digitalocean.com/blog/zerotrust-openclaw", "source": "DigitalOcean" }
        ];

        let fullMatrix = [];

        async function init() {
            lucide.createIcons();
            const grid = document.getElementById('matrix-grid');

            try {
                const response = await fetch('updates.json?t=' + Date.now());
                if (!response.ok) throw new Error("Offline");
                const data = await response.json();

                fullMatrix = data.liveTrends || [];
                if (data.deploymentTime) document.getElementById('arrival-time').innerText = data.deploymentTime;
            } catch (err) {
                console.warn("Usando Nodos Residentes. Links directos activados.");
                // Generamos 300 nodos a partir de los residentes para volumen masivo local
                fullMatrix = [];
                for (let i = 0; i < 300; i++) {
                    const base = RESIDENT_NODES[i % RESIDENT_NODES.length];
                    fullMatrix.push({ ...base, title: (i < 10 ? "" : `[REPLICA_${i}] `) + base.title });
                }
                document.getElementById('arrival-time').innerText = "RESIDENT_NODE_ACTUALIZED";
            }

            document.getElementById('node-count').innerText = fullMatrix.length;
            renderMatrix(fullMatrix);
        }

        function renderMatrix(items) {
            const grid = document.getElementById('matrix-grid');
            const html = items.map((item, idx) => {
                const isOC = item.openClow === true || (item.title && item.title.toLowerCase().includes('openclaw')) || (item.title && item.title.toLowerCase().includes('openclow'));
                const url = item.link || `https://www.google.com/search?q=${encodeURIComponent(item.title)}`;

                // Rompiendo el patrón con retardos de animación aleatorios
                const delay = (idx % 20) * 0.1;

                return `
                <div class="cube ${isOC ? 'openclow-active' : ''}" 
                     style="animation-delay: ${delay}s"
                     onclick="window.open('${url}', '_blank')">
                    <div class="cube-category">${item.category || 'NODE'}</div>
                    <div class="cube-title">${item.title}</div>
                    <div class="text-[6px] text-gray-600 mt-2 font-mono uppercase truncate w-full">
                        ${item.source || 'Intel'}
                    </div>
                </div>
                `;
            }).join('');
            grid.innerHTML = html;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = fullMatrix.filter(i =>
                (i.title && i.title.toLowerCase().includes(q)) ||
                (i.category && i.category.toLowerCase().includes(q))
            );
            renderMatrix(filtered);
            document.getElementById('node-count').innerText = filtered.length;
        });

        init();
    </script>
</body>

</html>
